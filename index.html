<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARU 온디바이스 AI</title>
    <!-- Tailwind CSS 적용 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 부드러운 화면 전환을 위한 스타일 */
        .fade-out {
            opacity: 0;
            transition: opacity 1s ease-out;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-[#5f4e19] flex items-center justify-center min-h-screen m-0 p-4">

    <!-- [1] 출시 제한 대기 화면 (카운트다운 및 검은 장막) -->
    <div id="launch-overlay" class="fixed inset-0 bg-black flex flex-col items-center justify-center z-50 text-white transition-opacity duration-1000">
        <h1 class="text-3xl font-bold mb-4">MARU 프로젝트 오픈 대기 중</h1>
        <div id="countdown" class="text-2xl font-mono tracking-wider">00:00:00:00</div>
    </div>

    <!-- [2] 메인 서비스 화면 (스마트폰 목업 데모) -->
    <div class="relative w-full max-w-[360px] aspect-[9/19] bg-black rounded-[40px] p-[12px] shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] border-4 border-[#333]">
        <!-- 스피커 홀 -->
        <div class="absolute top-[20px] left-1/2 -translate-x-1/2 w-[60px] h-[4px] bg-[#222] rounded-full z-20"></div>
        <!-- 전면 카메라 -->
        <div class="absolute top-[32px] left-1/2 -translate-x-1/2 w-[12px] h-[12px] bg-[#111] rounded-full z-20"></div>
        
        <!-- 액션 스크린 (선택하신 5f4e19 시그니처 컬러 반영) -->
        <div class="w-full h-full bg-[#5f4e19] rounded-[32px] overflow-hidden relative z-10 flex flex-col justify-between p-6">
            <!-- 내부 콘텐츠 영역 (여기에 전달해주신 이미지가 들어갑니다) -->
            <div class="w-full h-full relative overflow-hidden rounded-xl">
                <img id="mobileMainImage" src="마루_화면.jpg" class="w-full h-full object-cover rounded-xl" alt="MARU 온디바이스 AI 화면">
            </div>
        </div>
    </div>

    <!-- [3] 타이머 및 화면 제어 스크립트 -->
    <script>
        // 오픈 목표 시간 설정 (2026년 7월 20일 00시 00분)
        const TARGET_DATE = new Date("2026-07-20T00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = TARGET_DATE - now;

            const overlay = document.getElementById("launch-overlay");
            const countdownEl = document.getElementById("countdown");

            // 지정된 시간이 지나면 대기 화면을 없애고 메인을 보여줍니다
            if (difference <= 0) {
                overlay.classList.add("fade-out");
                setTimeout(() => overlay.remove(), 1000); // 1초 뒤 완전히 삭제
                clearInterval(timerInterval);
                return;
            }

            // 카운트다운 시간 계산
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // 두 자리 포맷팅 후 출력
            countdownEl.innerText = 
                `${String(days).padStart(2, '0')}:${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // 1초마다 타이머 업데이트 실행
        const timerInterval = setInterval(updateCountdown, 1000);
        updateCountdown(); // 초기 실행
    </script>
</body>
</html>
